# HWPX MCP — nginx reverse proxy snippet for ask.dgist.ac.kr
# ----------------------------------------------------------------------------
# Include this INSIDE the existing `server { ... }` block that already serves
# https://ask.dgist.ac.kr (Askon). The MCP container binds to 127.0.0.1:13701.
#
#   server {
#     listen 443 ssl http2;
#     server_name ask.dgist.ac.kr;
#     ssl_certificate     /etc/ssl/...;
#     ssl_certificate_key /etc/ssl/...;
#
#     # ... existing Askon config ...
#
#     include /etc/nginx/snippets/hwpx-mcp.conf;   # <-- this file
#   }
#
# After editing: `nginx -t && systemctl reload nginx`
# ----------------------------------------------------------------------------

# Per-IP rate limit — frustrates bearer-token brute force while leaving real
# users unaffected (Claude/ChatGPT webhooks typically fire < 1 req/sec).
# Place this `limit_req_zone` directive in the `http { }` context if it's not
# already there (usually in /etc/nginx/nginx.conf).
#
#   limit_req_zone $binary_remote_addr zone=mcp_rl:10m rate=30r/m;
#
# Keep only the `location` below inside `server { }`.

location /mcp {
    # Strip trailing slash ambiguity — match both /mcp and /mcp/...
    limit_req        zone=mcp_rl burst=20 nodelay;
    limit_req_status 429;

    # Optional: restrict to campus ranges. Uncomment and edit if needed.
    # allow 10.0.0.0/8;
    # allow 143.248.0.0/16;   # DGIST range — verify with network team
    # deny  all;

    # Upstream MCP container (docker-compose maps only to loopback)
    proxy_pass         http://127.0.0.1:13701;

    # Standard proxy headers
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    # Preserve Authorization & Mcp-Session-Id end-to-end
    proxy_pass_request_headers on;

    # --- SSE streaming (REQUIRED for MCP StreamableHTTP) --------------------
    # MCP responses are Server-Sent Events. Without these three, nginx will
    # buffer the response and Claude/ChatGPT will time out mid-call.
    proxy_buffering        off;
    proxy_cache            off;
    proxy_read_timeout     3600s;
    proxy_send_timeout     3600s;
    chunked_transfer_encoding on;

    # Upload payload cap (HWPX files as base64). Bump if you edit large docs.
    client_max_body_size   60m;
}
